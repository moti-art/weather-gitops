apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-tracker
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-tracker
  template:
    metadata:
      labels:
        app: weather-tracker
    spec:
      containers:
      - name: weather-tracker
        image: motinet/weather-tracker:latest
        ports:
        - containerPort: 5001
        resources:
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: weather-tracker
  namespace: default
spec:
  selector:
    app: weather-tracker
  ports:
  - protocol: TCP
    port: 5001
    targetPort: 5001