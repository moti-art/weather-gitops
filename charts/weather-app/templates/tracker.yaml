apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-tracker
spec:
  replicas: {{ .Values.tracker.replicaCount }}
  selector:
    matchLabels:
      app: weather-tracker
  template:
    metadata:
      labels:
        app: weather-tracker
    spec:
      containers:
      - name: weather-tracker
        image: "{{ .Values.tracker.image.repository }}:{{ .Values.tracker.image.tag }}"
        ports:
        - containerPort: {{ .Values.tracker.service.port }}
        resources:
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: weather-tracker
spec:
  selector:
    app: weather-tracker
  ports:
  - protocol: TCP
    port: {{ .Values.tracker.service.port }}
    targetPort: {{ .Values.tracker.service.port }}