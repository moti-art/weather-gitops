# Service עבור ה-Backend
apiVersion: v1
kind: Service
metadata:
  name: weather-backend-svc
spec:
  type: ClusterIP
  selector:
    app: weather-backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
---
# Service עבור ה-Frontend
apiVersion: v1
kind: Service
metadata:
  name: weather-frontend-svc
spec:
  type: NodePort
  selector:
    app: weather-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5001
      nodePort: 30001